<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA Reminders & Knowledge Hub 3.0</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            /* Paleta de colores principal */
            --c-orange:        #ff8d56;
            --c-pink:          #ffbfcb;
            --c-yellow:        #fbe883;
            --c-teal:          #069594;

            --c-bg-dark:       #0d131a;  /* Fondo un poco más profundo para contraste */
            --c-card-dark:     #16202c;
            --c-ultra-dark:    #080c10;
            --c-white:         #FFFFFF;

            --bg-main: var(--c-bg-dark);
            --card-bg: rgba(22, 32, 44, 0.9);
            --card-hover: rgba(6, 149, 148, 0.25);
            --border-color: rgba(251, 232, 131, 0.35);
            
            --primary: var(--c-teal);
            --primary-hover: #08b2b1;

            --text-main: var(--c-white);
            --text-muted: #b4c3d4;
            --shadow-lg: 0 20px 35px -10px rgba(0, 0, 0, 0.8);
            --shadow-glow: 0 0 30px rgba(6, 149, 148, 0.4);
            --shadow-glow-orange: 0 0 25px rgba(255, 141, 86, 0.4);
        }

        /* --- SCROLLBARS OCULTOS --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        *::-webkit-scrollbar {
            display: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 60px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated aurora mesh — slow drifting light instead of a static gradient */
        .aurora-layer {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(255, 141, 86, 0.26) 0%, transparent 45%),
                radial-gradient(circle at 85% 20%, rgba(255, 191, 203, 0.20) 0%, transparent 40%),
                radial-gradient(circle at 90% 85%, rgba(6, 149, 148, 0.32) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(251, 232, 131, 0.14) 0%, transparent 45%);
            background-size: 180% 180%;
            animation: auroraDrift 22s ease-in-out infinite alternate;
            will-change: background-position;
        }

        @keyframes auroraDrift {
            0%   { background-position: 0% 0%, 100% 0%, 100% 100%, 0% 100%; }
            50%  { background-position: 20% 30%, 80% 10%, 85% 80%, 25% 70%; }
            100% { background-position: 10% 15%, 90% 25%, 95% 90%, 10% 85%; }
        }

        /* Floating particle canvas, sits behind all content */
        #particleCanvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes popIn {
            0%   { opacity: 0; transform: scale(0.85) translateY(14px); }
            60%  { opacity: 1; transform: scale(1.03) translateY(-2px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes fireFlicker {
            0%, 100% { transform: scale(1) rotate(-2deg); filter: drop-shadow(0 0 6px rgba(255,191,203,0.6)); }
            50% { transform: scale(1.15) rotate(2deg); filter: drop-shadow(0 0 12px rgba(255,191,203,0.9)); }
        }

        @keyframes shimmerSweep {
            0% { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }

        @keyframes ripple-anim {
            to { transform: scale(3); opacity: 0; }
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(60px) scale(0.9); }
            to   { opacity: 1; transform: translateX(0) scale(1); }
        }

        @keyframes progressGrow {
            from { width: 0%; }
        }

        @keyframes gradientSpin {
            to { --grad-angle: 360deg; }
        }

        .container {
            max-width: 1240px;
            margin: 0 auto;
            padding: 35px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header Layout */
        .header {
            background: linear-gradient(135deg, rgba(22, 32, 44, 0.95) 0%, rgba(8, 12, 16, 0.98) 100%);
            backdrop-filter: blur(16px);
            border: 2px solid rgba(251, 232, 131, 0.3);
            border-radius: 24px;
            padding: 32px 36px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-lg), 0 0 25px rgba(255, 141, 86, 0.2);
            position: relative;
            overflow: hidden;
            animation: fadeSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .stat-streak i { display: inline-block; animation: fireFlicker 1.6s ease-in-out infinite; }

        .header::before, .header::after {
            content: '';
            position: absolute;
            left: 0; right: 0;
            height: 7px;
            background-image: radial-gradient(circle, var(--c-yellow) 38%, transparent 42%);
            background-size: 24px 7px;
            background-repeat: repeat-x;
            filter: drop-shadow(0 0 4px var(--c-yellow));
        }
        .header::before { top: 0; animation: marqueeChase 1.1s linear infinite; }
        .header::after { bottom: 0; animation: marqueeChase 1.1s linear infinite reverse; }

        @keyframes marqueeChase {
            from { background-position: 0 0; }
            to   { background-position: 48px 0; }
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .brand-section h1 {
            font-family: 'Bebas Neue', 'Plus Jakarta Sans', sans-serif;
            font-size: 3.1em;
            font-weight: 400;
            color: var(--c-white);
            display: flex;
            align-items: center;
            gap: 14px;
            letter-spacing: 2px;
            line-height: 1;
            text-shadow: 0 0 18px rgba(255, 141, 86, 0.35), 0 0 4px rgba(255,255,255,0.4);
        }

        .brand-section h1 i {
            color: var(--c-orange);
            filter: drop-shadow(0 0 12px var(--c-orange));
        }

        .brand-section .subtitle {
            color: var(--c-pink);
            font-size: 0.9em;
            font-weight: 600;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-stats-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(8, 12, 16, 0.9);
            padding: 8px 18px;
            border-radius: 16px;
            border: 1px solid var(--c-yellow);
            box-shadow: 0 0 15px rgba(251, 232, 131, 0.2);
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 800;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .stat-pill span {
            font-family: 'Space Mono', monospace;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
        }

        .stat-xp { color: var(--c-yellow); text-shadow: 0 0 8px rgba(251, 232, 131, 0.5); }
        .stat-streak { color: var(--c-pink); text-shadow: 0 0 8px rgba(255, 191, 203, 0.5); }

        .role-selector-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(6, 149, 148, 0.35);
            padding: 6px 14px;
            border-radius: 10px;
            border: 1px solid var(--c-teal);
            box-shadow: 0 0 10px rgba(6, 149, 148, 0.4);
        }

        .role-selector-container label {
            font-size: 11px;
            font-weight: 800;
            color: var(--c-yellow);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .role-select {
            background: transparent;
            color: var(--c-white);
            border: none;
            font-weight: 700;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            font-family: inherit;
        }

        .role-select option {
            background: var(--c-card-dark);
            color: var(--c-white);
        }

        /* Controls Wrapper */
        .controls-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .search-container {
            flex-grow: 1;
            position: relative;
            max-width: 480px;
        }

        .search-container input {
            width: 100%;
            padding: 13px 18px 13px 45px;
            border-radius: 14px;
            border: 1px solid var(--c-orange);
            font-size: 14px;
            background-color: rgba(8, 12, 16, 0.95);
            color: var(--text-main);
            outline: none;
            transition: all 0.25s ease;
            box-shadow: inset 0 0 8px rgba(255, 141, 86, 0.15);
        }

        .search-container input:focus {
            border-color: var(--c-yellow);
            box-shadow: 0 0 20px rgba(251, 232, 131, 0.4);
        }

        .search-container i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--c-orange);
        }

        .action-btns {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 11px 22px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .ripple-el {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.55);
            transform: scale(0);
            pointer-events: none;
            animation: ripple-anim 0.6s ease-out forwards;
        }

        .btn-primary { 
            background: var(--c-teal); 
            color: var(--c-white); 
            box-shadow: 0 4px 20px rgba(6, 149, 148, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-primary:hover { 
            background: var(--primary-hover); 
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(6, 149, 148, 0.8);
        }

        .btn-success { 
            background: rgba(255, 141, 86, 0.25); 
            color: var(--c-orange); 
            border: 1px solid var(--c-orange);
            box-shadow: 0 0 15px rgba(255, 141, 86, 0.2);
        }
        .btn-success:hover { 
            background: var(--c-orange);
            color: var(--c-ultra-dark);
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--c-orange);
        }

        .btn-admin { 
            background: rgba(255, 191, 203, 0.25); 
            color: var(--c-pink); 
            border: 1px solid var(--c-pink);
            box-shadow: 0 0 15px rgba(255, 191, 203, 0.2);
        }
        .btn-admin:hover { 
            background: var(--c-pink); 
            color: var(--c-ultra-dark);
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--c-pink);
        }

        .btn-secondary { 
            background: rgba(255, 255, 255, 0.08); 
            color: var(--c-white); 
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }

        /* Navigation Tabs */
        .categories {
            display: flex;
            gap: 14px;
            margin-bottom: 32px;
            overflow-x: auto;
            padding: 10px 4px 14px;
        }

        .category-btn {
            position: relative;
            background:
                repeating-conic-gradient(var(--c-ultra-dark) 0deg 18deg, rgba(251,232,131,0.35) 18deg 36deg);
            color: var(--text-muted);
            border: 3px solid rgba(251, 232, 131, 0.3);
            width: 64px;
            height: 64px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 800;
            font-size: 10px;
            white-space: nowrap;
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease, border-color 0.25s ease;
            font-family: 'Plus Jakarta Sans', sans-serif;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 4px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.5), 0 6px 14px rgba(0,0,0,0.5);
        }

        .category-btn span {
            background: var(--c-ultra-dark);
            border-radius: 50%;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
            font-size: 9px;
            line-height: 1.05;
            overflow: hidden;
            word-break: break-word;
        }

        .category-btn:hover {
            border-color: var(--c-orange);
            color: var(--c-orange);
            transform: translateY(-4px) rotate(-4deg);
            box-shadow: 0 8px 0 rgba(0,0,0,0.5), 0 14px 20px rgba(255, 141, 86, 0.35);
        }

        .category-btn.active {
            background: repeating-conic-gradient(var(--c-yellow) 0deg 18deg, var(--c-orange) 18deg 36deg);
            color: var(--c-ultra-dark);
            border-color: var(--c-white);
            font-weight: 800;
            transform: translateY(-8px) rotate(3deg) scale(1.05);
            box-shadow: 0 10px 0 rgba(0,0,0,0.55), 0 16px 24px rgba(251, 232, 131, 0.5);
        }
        .category-btn.active span { background: var(--c-ultra-dark); color: var(--c-yellow); }

        /* Grid & Cards */
        .reminders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 24px;
        }

        .reminder-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(6, 149, 148, 0.35);
            padding: 24px;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            opacity: 0;
            animation: popIn 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
            will-change: transform;
            overflow: hidden;
        }

        .reminder-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: radial-gradient(280px circle at var(--mx, 50%) var(--my, 50%), rgba(255, 141, 86, 0.20), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .reminder-card:hover::before { opacity: 1; }

        .reminder-card:hover {
            transform: translateY(-6px) scale(1.012) rotate(-0.6deg);
            background: rgba(6, 149, 148, 0.18);
            border-color: var(--c-orange);
            box-shadow: var(--shadow-lg), var(--shadow-glow-orange);
        }

        .reminder-card > * { position: relative; z-index: 1; }

        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 14px;
        }

        .card-perforation {
            height: 6px;
            margin: -16px 0 16px;
            background-image: radial-gradient(circle, rgba(6,149,148,0.6) 32%, transparent 36%);
            background-size: 14px 6px;
            background-repeat: repeat-x;
            opacity: 0.7;
        }

        .card-emoji {
            font-size: 1.8em;
            background: var(--c-ultra-dark);
            padding: 8px 14px;
            border-radius: 14px;
            border: 1px solid var(--c-orange);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 0 10px rgba(255, 141, 86, 0.2);
        }

        .card-actions {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            background: var(--c-ultra-dark);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            width: 34px;
            height: 34px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
        }

        .icon-btn:hover { background: var(--c-teal); color: var(--c-white); border-color: var(--c-teal); box-shadow: 0 0 10px var(--c-teal); }
        .icon-btn.delete-btn:hover { background: var(--c-orange); color: var(--c-ultra-dark); border-color: var(--c-orange); box-shadow: 0 0 10px var(--c-orange); }

        .card-body h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--c-white);
        }

        .card-body .preview-content {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 18px;
            max-height: 80px;
            overflow-y: auto;
        }

        .reactions-container {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .reaction-pill {
            background: var(--c-ultra-dark);
            border: 1px solid rgba(255, 191, 203, 0.3);
            color: var(--text-muted);
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .reaction-pill:hover {
            border-color: var(--c-pink);
            color: var(--c-white);
            box-shadow: 0 0 10px rgba(255, 191, 203, 0.3);
        }

        .reaction-pill.active {
            border-color: var(--c-pink);
            color: var(--c-pink);
            background: rgba(255, 191, 203, 0.25);
            box-shadow: 0 0 12px rgba(255, 191, 203, 0.4);
        }

        .tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            background: rgba(6, 149, 148, 0.3);
            color: var(--c-yellow);
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid var(--c-teal);
            box-shadow: 0 0 8px rgba(6, 149, 148, 0.3);
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 12, 16, 0.92);
            backdrop-filter: blur(0px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease, backdrop-filter 0.3s ease;
        }

        .modal-overlay.active { opacity: 1; visibility: visible; backdrop-filter: blur(12px); }

        .modal-card {
            background: linear-gradient(145deg, var(--c-card-dark) 0%, var(--c-ultra-dark) 100%);
            border: 2px solid var(--c-teal);
            width: 92%;
            max-width: 680px;
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.85) translateY(30px);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        /* Flip-style modal: the card genuinely flips face-up like a playing card, not just a fade/scale */
        .modal-overlay.flip-style { perspective: 1400px; }
        .modal-overlay.flip-style .modal-card {
            transform: rotateY(-100deg) scale(0.96);
            transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease;
            background: 
                repeating-linear-gradient(135deg, rgba(6,149,148,0.10) 0 10px, rgba(8,12,16,0.0) 10px 20px),
                linear-gradient(145deg, var(--c-card-dark) 0%, var(--c-ultra-dark) 100%);
        }
        .modal-overlay.flip-style.active .modal-card {
            transform: rotateY(0deg) scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .modal-header h2 { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.45em; 
            color: var(--c-white); 
        }

        .close-modal {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal:hover { color: var(--c-orange); }

        /* Form Controls & Rich Text Editor */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 11px;
            font-weight: 800;
            color: var(--c-yellow);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 13px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--c-ultra-dark);
            color: var(--c-white);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus { 
            border-color: var(--c-teal); 
            box-shadow: 0 0 15px rgba(6, 149, 148, 0.4);
        }

        /* Wysiwyg Editor Toolbar */
        .editor-toolbar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            background: var(--c-ultra-dark);
            border: 1px solid var(--border-color);
            border-bottom: none;
            padding: 8px 12px;
            border-radius: 12px 12px 0 0;
        }

        .editor-btn {
            background: rgba(22, 32, 44, 0.9);
            border: 1px solid var(--border-color);
            color: var(--c-white);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;

        }

        .editor-btn:hover {
            background: var(--c-teal);
            color: var(--c-white);
            border-color: var(--c-teal);
            box-shadow: 0 0 10px var(--c-teal);
        }

        .editor-content {
            width: 100%;
            min-height: 160px;
            max-height: 300px;
            overflow-y: auto;
            padding: 14px 16px;
            border-radius: 0 0 12px 12px;
            border: 1px solid var(--border-color);
            background: var(--c-ultra-dark);
            color: var(--c-white);
            font-family: inherit;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
        }

        .editor-content:focus {
            border-color: var(--c-teal);
            box-shadow: 0 0 15px rgba(6, 149, 148, 0.4);
        }

        /* Content formatting */
        .formatted-content h2 { font-size: 1.3em; color: var(--c-yellow); margin: 12px 0 6px 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        .formatted-content h3 { font-size: 1.1em; color: var(--c-pink); margin: 10px 0 4px 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        .formatted-content ul, .formatted-content ol { padding-left: 20px; margin-bottom: 10px; }
        .formatted-content li { margin-bottom: 4px; }
        .formatted-content blockquote { border-left: 3px solid var(--c-orange); padding-left: 12px; color: var(--text-muted); font-style: italic; margin: 8px 0; }

        .categories-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .checkbox-label { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 13px; 
            color: var(--text-muted); 
            cursor: pointer; 
        }

        /* Admin Dashboard */
        .admin-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--c-ultra-dark);
            border: 1px solid var(--c-orange);
            padding: 18px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 0 15px rgba(255, 141, 86, 0.15);
        }

        .stat-card-val { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 2.2em; 
            font-weight: 800; 
            color: var(--c-teal); 
            text-shadow: 0 0 10px rgba(6, 149, 148, 0.4);
        }
        .stat-card-lbl { 
            font-size: 11px; 
            font-weight: 800; 
            color: var(--c-yellow);

            letter-spacing: 0.6px;
        }

        .admin-tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 22px;

        .admin-tab-btn { 
            background: transparent; 
            border: none;

            font-weight: 700;

        }

        .responses-list, .questions-list { display: flex; flex-direction: column; gap: 12px; }
        .item-box { 
            background: var(--c-ultra-dark); 
            border: 1px solid var(--border-color);

            border-radius: 14px; 
        }
        .item-box-header { 
            display: flex; 
            justify-content: space-between; 
            font-weight: 700; 
            margin-bottom: 8px; 
            font-size: 13px; 
            color: var(--c-white);
        }

        /* Quiz UI Elements */
        .quiz-opt-btn {
            width: 100%;
            background: var(--c-ultra-dark);
            border: 1px solid var(--border-color);
            padding: 15px 20px;
            border-radius: 14px;
            color: var(--c-white);
            font-size: 14px;
            text-align: left;
            cursor: pointer;
            margin-bottom: 12px;

        }
        .quiz-opt-btn:hover { border-color: var(--c-teal); background: rgba(6, 149, 148, 0.25); box-shadow: 0 0 12px rgba(6, 149, 148, 0.3); }
        .quiz-opt-btn.correct { background: rgba(6, 149, 148, 0.4) !important; border-color: var(--c-teal) !important; color: var(--c-white); box-shadow: 0 0 15px var(--c-teal); }
        .quiz-opt-btn.wrong { background: rgba(255, 141, 86, 0.35) !important; border-color: var(--c-orange) !important; box-shadow: 0 0 15px var(--c-orange); }

        .no-results { grid-column: 1 / -1; text-align: center; padding: 50px; color: var(--text-muted); display: none; }

        /* Toast Notifications (replaces alert()) */
        #toastContainer {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: linear-gradient(135deg, var(--c-card-dark), var(--c-ultra-dark));
            border: 1px solid var(--c-orange);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 18px rgba(255, 141, 86, 0.3);
            color: var(--c-white);
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 320px;
            animation: toastIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .toast.warn { border-color: var(--c-pink); box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 18px rgba(255, 191, 203, 0.35); }
        .toast i { color: var(--c-orange); font-size: 16px; }
        .toast.warn i { color: var(--c-pink); }

        /* Quiz Progress Bar */
        .quiz-progress-track {
            width: 100%;
            height: 8px;
            background: var(--c-ultra-dark);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .quiz-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--c-orange), var(--c-yellow), var(--c-teal));
            border-radius: 20px;
            transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 12px rgba(255, 141, 86, 0.6);

        /* Jackpot Slot Reels (quiz completion signature moment) */
        .slot-machine {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 10px 0 22px;
        }
        .slot-reel {

        .slot-reel.landed { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
        .slot-result-hidden { opacity: 0; transform: translateY(10px); transition: opacity 0.4s ease, transform 0.4s ease; }
        .slot-result-visible { opacity: 1; transform: translateY(0); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>

    <script>
        // Audio Effects Synthesizer
        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                    osc.start(); osc.stop(ctx.currentTime + 0.2);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(220, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                    osc.start(); osc.stop(ctx.currentTime + 0.2);
                } else if (type === 'click') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(400, ctx.currentTime);
                    gain.gain.setValueAtTime(0.04, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
                    osc.start(); osc.stop(ctx.currentTime + 0.05);
                }
            } catch(e) {}
        };

        // --- Ambient Particle Background (soft glowing orbs drifting behind the UI) ---
        (function initParticles() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let w, h, particles;
            const colors = ['rgba(255,141,86,', 'rgba(255,191,203,', 'rgba(251,232,131,', 'rgba(6,149,148,'];
            const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }

            function makeParticles() {
                const count = Math.min(42, Math.floor((w * h) / 45000));
                particles = Array.from({ length: count }, () => ({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: 30 + Math.random() * 70,
                    dx: (Math.random() - 0.5) * 0.15,
                    dy: (Math.random() - 0.5) * 0.15,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    alpha: 0.035 + Math.random() * 0.06
                }));
            }

            function tick() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => {
                    p.x += p.dx; p.y += p.dy;
                    if (p.x < -p.r) p.x = w + p.r; if (p.x > w + p.r) p.x = -p.r;
                    if (p.y < -p.r) p.y = h + p.r; if (p.y > h + p.r) p.y = -p.r;
                    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
                    grad.addColorStop(0, p.color + p.alpha + ')');
                    grad.addColorStop(1, p.color + '0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                });
                if (!reduceMotion) requestAnimationFrame(tick);
            }

            resize();
            makeParticles();
            window.addEventListener('resize', () => { resize(); makeParticles(); });
            tick();
        })();

        // --- Jackpot Reels: spins 3 slot reels then lands on a combo matching the score tier ---
        function runJackpotReels(percentage, onDone) {
            const pool = ['🍒', '🔔', '⭐', '💎', '7️⃣', '🍋'];
            let finalSymbols;
            if (percentage === 100) finalSymbols = ['💎', '💎', '💎'];
            else if (percentage >= 70) finalSymbols = ['⭐', '⭐', '⭐'];
            else {
                finalSymbols = [pool[0], pool[1], pool[2]];
            }

            const reels = [document.getElementById('reel0'), document.getElementById('reel1'), document.getElementById('reel2')];
            const durations = [700, 950, 1250];
            let stopped = 0;

            reels.forEach((reel, i) => {
                const spinInterval = setInterval(() => {
                    reel.innerText = pool[Math.floor(Math.random() * pool.length)];
                }, 70);

                setTimeout(() => {
                    clearInterval(spinInterval);
                    reel.innerText = finalSymbols[i];
                    reel.classList.add('landed');
                    playSound('click');
                    stopped++;
                    if (stopped === reels.length) {
                        setTimeout(onDone, 250);
                    }
                }, durations[i]);
            });
        }

        // --- Toast Notifications (replaces jarring native alert() popups) ---
        function toast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = `toast ${type === 'warn' ? 'warn' : ''}`;

        // --- Ripple Effect on Buttons ---

            const btn = e.target.closest('.btn, .quiz-opt-btn, .category-btn');
            if (!btn) return;
            const rect = btn.getBoundingClientRect();
            const ripple = document.createElement('span');
            const size = Math.max(rect.width, rect.height) * 1.4;
            ripple.className = 'ripple-el';
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 650);
        });

        // --- Animated Counter (smooth count-up instead of an instant number swap) ---
        function animateCounter(el, from, to, suffix = '', duration = 700) {
            const start = performance.now();
            function step(now) {
                const progress = Math.min((now - start) / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = Math.round(from + (to - from) * eased);
                el.innerText = `${current}${suffix}`;
                if (progress < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function addReaction(id, emojiKey) {
            playSound('click');

                const trackingKey = `reacted_${id}_${emojiKey}`;
                if (localStorage.getItem(trackingKey)) {
                    reminders[index].reactions[emojiKey] = Math.max(0, (reminders[index].reactions[emojiKey] || 1) - 1);
                    localStorage.removeItem(trackingKey);
                } else {
                    reminders[index].reactions[emojiKey] = (reminders[index].reactions[emojiKey] || 0) + 1;
                    localStorage.setItem(trackingKey, 'true');
                }
                saveData();
                renderReminders();
            }

        function savePost(event) {
            event.preventDefault();

                    </div>
                `;

                runJackpotReels(percentage, () => {
                    const fireConfetti = () => {
                        const colors = ['#ff8d56', '#ffbfcb', '#fbe883', '#069594'];
                        confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 }, colors });
                        confetti({ particleCount: 60, angle: 60, spread: 60, origin: { x: 0, y: 0.7 }, colors });
                        confetti({ particleCount: 60, angle: 120, spread: 60, origin: { x: 1, y: 0.7 }, colors });
                    };
                    fireConfetti();
                    setTimeout(fireConfetti, 350);
                    if (percentage === 100) setTimeout(fireConfetti, 700);

        function selectQuizAnswer(selectedIdx) {
            const q = questions[currentQuizIndex];
            const buttons = document.querySelectorAll('.quiz-opt-btn');
            const isCorrect = selectedIdx === q.correctIndex;

            currentUserAnswers.push({
                question: q.question,
                selected: q.options[selectedIdx],
                correct: q.options[q.correctIndex],
                isCorrect: isCorrect
            });

            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === q.correctIndex) btn.classList.add('correct', 'selected-pulse');
                else if (idx === selectedIdx) btn.classList.add('wrong', 'selected-pulse');
            });

            if (isCorrect) { playSound('correct'); quizScore++; } 
            else { playSound('wrong'); }

            setTimeout(() => {
                currentQuizIndex++;
                renderQuizQuestion();
            }, 1200);
        }

        function saveQuestion(e) {
            e.preventDefault();
            const id = document.getElementById('qId').value;
            const questionText = document.getElementById('qTitleInput').value;
            const optInputs = document.querySelectorAll('.qOptInput');
            const options = Array.from(optInputs).map(inp => inp.value);
            const correctIndex = parseInt(document.getElementById('qCorrectIndex').value);

            if (id) {
                const idx = questions.findIndex(q => q.id == id);
                questions[idx] = { id: parseInt(id), question: questionText, options, correctIndex };
            } else {
                questions.push({ id: Date.now(), question: questionText, options, correctIndex });
            }

            playSound('correct');
            saveData();
            closeEditQuestionModal();
            renderAdminStats();
            renderAdminQuestions();
            toast(id ? "Question updated." : "New question added to the quiz bank.");
        }

        init();
    </script>
</body>
</html>
